<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>404 — StockIQ</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Plus Jakarta Sans',sans-serif;background:#f8f9fc;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center}
    .err-code{font-size:8rem;font-weight:800;background:linear-gradient(135deg,#2563eb,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1}
    h2{font-size:1.5rem;font-weight:700;margin:.5rem 0;color:#1e293b}
    p{color:#64748b;margin-bottom:2rem}
    a{display:inline-flex;align-items:center;gap:.5rem;background:#2563eb;color:#fff;text-decoration:none;padding:.75rem 1.5rem;border-radius:.75rem;font-weight:600;transition:opacity .2s}
    a:hover{opacity:.85}
  </style>
</head>
<body>
  <div>
    <div class="err-code">404</div>
    <h2>Page Not Found</h2>
    <p>The page you're looking for doesn't exist.</p>
    <a href="/dashboard"><i class="bi bi-house-fill"></i> Go Home</a>
  </div>
</body>
</html>
